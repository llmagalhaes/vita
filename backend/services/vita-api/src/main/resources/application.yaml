spring:
  application:
    name: vita-api
  config:
    # Local secrets live in secrets.yaml (gitignored) next to the service; prod uses env vars.
    import: optional:file:./secrets.yaml
  datasource:
    # Local defaults match docker-compose.yml (BE-002). Prod overrides via env vars.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vita}
    username: ${DB_USERNAME:vita}
    password: ${DB_PASSWORD:vita}
  mvc:
    problemdetails:
      enabled: true # RFC 7807 for framework-raised errors (ADR-0006)
  servlet:
    multipart:
      # BE-018 /parse/photo backstop (contract 5 MB; app downscales to 1568px JPEG q0.8).
      # Over max-file-size → MaxUploadSizeExceededException → 413 (MultipartUploadAdvice).
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: 8080

vita:
  crypto:
    # Local-dev keys only — they protect throwaway local data. Production
    # injects all four from Secrets Manager / KMS via env vars (devops).
    master-key: ${VITA_MASTER_KEY:tW72mlhgUsBNwaVxvuKf9hg8GiwbJl3ltv0eQZG8gBg=} # LocalKeyWrapper stand-in for the KMS CMK
    service-dek: ${VITA_SERVICE_DEK:miPHUrqMdXlXeU9W6VcKk527rLA4O/JHXTGgs36mGuw=}
    hmac-key: ${VITA_HMAC_KEY:htaXJkT4dsD7vcrZKZwzvujzoO0Ejgn5CpcHL+Y8kP4=}
    # BE-027: KMS CMK for the real KeyWrapper (aws profile only). Resolved by alias — the
    # underlying key id rotates per LocalStack boot; prod points it at the real CMK.
    kms-key-alias: ${VITA_KMS_KEY_ALIAS:alias/vita-app-data}
  auth:
    jwt-secret: ${VITA_JWT_SECRET:iQ++oV3e0wPik59c+COiHteevtkkC4AF/urU8W8t6j4=}
    access-ttl-seconds: 900
    refresh-ttl-days: 60
    rate-limit-per-email: 3 # magic-link requests per 15-min window
    rate-limit-per-ip: 10
    # v1 links open the app scheme directly; becomes an https redirect once a domain exists.
    magic-link-base-url: ${VITA_MAGIC_LINK_BASE_URL:vita://auth}
  ai:
    # Product AI — Claude parse endpoint (BE-013, ADR-0005). base-url points at a
    # WireMock stub in tests. Key comes from keys.anthropic (env/secrets.yaml only).
    model: ${VITA_AI_MODEL:claude-haiku-4-5}
    base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
    max-output-tokens: 1024
    timeout-seconds: 10
    # BE-014 abuse guard: per-user parses per UTC day; over it → 429 + Retry-After. Invisible in normal use.
    daily-parse-limit: ${VITA_AI_DAILY_PARSE_LIMIT:50}
    # Model tiering (ADR-0005), ids verified against the claude-api reference (BE-023, 2026-07-14):
    #   text parse + text plan → Haiku (claude-haiku-4-5, confirmed working).
    #   PDF import + photo → Sonnet-class (claude-sonnet-4-6): native document + vision input,
    #   and thinking-OFF by default, which the 2048-token tool-forced call relies on (claude-sonnet-5
    #   would turn adaptive thinking on and share that budget, risking a truncated tool call).
    # BE-015 plan/program import (ADR-0011): text → Haiku; PDF → Sonnet-class native document input.
    plan-model: ${VITA_AI_PLAN_MODEL:claude-haiku-4-5}
    plan-pdf-model: ${VITA_AI_PLAN_PDF_MODEL:claude-sonnet-4-6}
    # BE-018 photo parse (F3): Claude vision, Sonnet-class per ADR-0005 (vision only for photos/PDF).
    photo-model: ${VITA_AI_PHOTO_MODEL:claude-sonnet-4-6}
    plan-max-output-tokens: 2048
    plan-timeout-seconds: 25 # a plan/PDF call is larger than capture parse; still inside API Gateway's 29 s ceiling
  uploads:
    # BE-015: presigned-upload seam (OPS-011). Local dev has no S3 — LocalFileStore vends a stub
    # URL and reads fixtures from this dir. The `aws` profile swaps in S3FileStore (BE-026).
    local-dir: ${VITA_UPLOADS_LOCAL_DIR:${java.io.tmpdir}/vita-uploads}
    url-ttl-seconds: 900
    # BE-026: S3 bucket for the real presigner (aws profile only). LocalStack default below;
    # prod overrides via env.
    bucket: ${VITA_UPLOADS_BUCKET:vita-uploads-local}
  aws:
    # BE-026/BE-027: only consulted under the `aws` profile. endpoint-override is the sole
    # local-vs-prod switch — set to http://localhost:4566 for LocalStack, blank for real AWS.
    region: ${VITA_AWS_REGION:eu-west-1}
    endpoint-override: ${VITA_AWS_ENDPOINT_OVERRIDE:}
  plans:
    # BE-019/BE-020 (ADR-0011 ext): how many past versions of the eating plan /
    # training program to keep. POST beyond this drops the oldest (D5).
    history-max: ${VITA_PLANS_HISTORY_MAX:5}
  oidc:
    # BE-007 (ADR-0015): Google/Apple sign-in. `audience` is the OAuth client id we must
    # see in the token's `aud` — it comes from the SSM params google-client-config /
    # apple-client-config (devops maps SSM → these env vars). BLANK in dev, and a blank
    # audience makes that provider fail closed (503). jwks-uri is the fixed provider
    # constant (overridden to a stub in tests); issuers are hardcoded in OidcVerifier.
    google:
      audience: ${GOOGLE_OIDC_AUDIENCE:}
      jwks-uri: ${GOOGLE_JWKS_URI:https://www.googleapis.com/oauth2/v3/certs}
    apple:
      audience: ${APPLE_OIDC_AUDIENCE:}
      jwks-uri: ${APPLE_JWKS_URI:https://appleid.apple.com/auth/keys}

keys:
  # Never put the real key here — this file is committed. Local: secrets.yaml; prod: env var.
  anthropic: ${ANTHROPIC_API_KEY:}
