# Backend CI — build, lint, test (incl. Testcontainers Postgres).
# Written before the GitHub remote exists: activates automatically on first push.
# Assumptions: repo pushed as-is (workflows at repo root), ubuntu-latest runners
# (Docker preinstalled, needed by Testcontainers), no secrets required.
name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/services/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/services/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/vita-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build, lint and test
        run: ./gradlew check
