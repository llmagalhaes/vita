openapi: 3.1.0
info:
  title: Vita API
  version: 0.5.0
  description: |
    Contract v0 — auth, user profile, log entries, AI parse. App-team review
    complete 2026-07-13 (`app/Doc/contract-review-v0.md`): approved, with two
    edits applied in 0.2.0 (muscles enum, drafts maxItems — backend ADR-0010).
    0.3.0 adds plan/program parse-import for onboarding steps 3-4 (two parse
    endpoints + a presigned-upload endpoint — backend ADR-0011).
    0.4.0 is an additive "Vita 100% local" bump (backlog-local-100): it starts
    with GET /entries gaining `from`/`to` and a CSV `type` filter (BE-017);
    plan/program history+edit, `/me/vacations`, and the `checkin` entry type
    land in later 0.4.0 tickets. No 0.3.0 consumer breaks.
    0.5.0 adds `Exercise.muscles` (per-exercise muscle tinting) — additive,
    optional; the workout-level `WorkoutDetail.muscles` is unchanged.
    Governed by ADR-0006 (contract-first REST, RFC 7807, cursor pagination)
    and ADR-0005 (AI drafts are never persisted server-side).

    Conventions:
    - Base path /v1, JSON, camelCase.
    - Auth: `Authorization: Bearer <accessToken>` (JWT, ~15 min) unless marked public.
    - All errors are RFC 7807 application/problem+json.
    - Timestamps are RFC 3339 date-time with offset.
servers:
  - url: /v1
    description: Placeholder — API Gateway default URL until a domain is purchased (CEO Round 3).

security:
  - bearerAuth: []

tags:
  - name: auth
  - name: account
  - name: entries
  - name: parse
  - name: uploads
  - name: plans

paths:
  # ── Auth ────────────────────────────────────────────────────────────────
  /auth/magic-link:
    post:
      tags: [auth]
      summary: Request a magic-link email
      description: |
        Always returns 202 with an identical body whether or not the email is
        registered (no account enumeration). Rate-limited per email and per IP.
        The email contains a link that opens the app with a single-use token
        (15-min expiry).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "202":
          description: Accepted (regardless of whether the email is registered).
        "429": { $ref: "#/components/responses/TooManyRequests" }
        default: { $ref: "#/components/responses/Problem" }

  /auth/magic-link/verify:
    post:
      tags: [auth]
      summary: Exchange a magic-link token for a session
      description: |
        Consumes the single-use token from the email deep link. Creates the
        account on first sign-in. Signing in during a pending account deletion
        cancels the deletion (ADR-0004).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: Opaque token from the magic-link URL.
      responses:
        "200":
          description: Session created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401":
          description: Token invalid, expired, or already consumed.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        default: { $ref: "#/components/responses/Problem" }

  /auth/oidc:
    post:
      tags: [auth]
      summary: Sign in with a Google or Apple id token
      description: |
        The app performs native sign-in and sends the provider id token; the
        backend verifies signature/issuer/audience/nonce and finds-or-creates
        the user keyed on (provider, subject), linking by verified email.
        Signing in during a pending account deletion cancels the deletion.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, idToken]
              properties:
                provider:
                  type: string
                  enum: [google, apple]
                idToken:
                  type: string
                nonce:
                  type: string
                  description: Raw nonce used in the native sign-in request, when the platform requires it.
                name:
                  type: string
                  maxLength: 100
                  description: >-
                    Apple only exposes the user's name to the app on first
                    authorization and it is absent from the id token — the app
                    passes it here on first sign-in. Can be absent even then;
                    the backend derives a placeholder from the email local-part
                    and the user sets their name in onboarding (PATCH /me).
      responses:
        "200":
          description: Session created (account created on first sign-in).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401":
          description: Id token failed verification.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        default: { $ref: "#/components/responses/Problem" }

  /auth/refresh:
    post:
      tags: [auth]
      summary: Rotate a refresh token
      description: |
        Exchanges a valid refresh token for a new token pair. The old refresh
        token is revoked (single-use rotation). Reuse of a rotated token
        revokes the whole token family and returns 401.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: New token pair.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401":
          description: Refresh token invalid, expired, revoked, or reused.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        default: { $ref: "#/components/responses/Problem" }

  /auth/sign-out:
    post:
      tags: [auth]
      summary: Sign out (revoke a refresh token)
      description: Revokes the given refresh token. Always 204, even if already revoked.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "204":
          description: Revoked (idempotent).
        default: { $ref: "#/components/responses/Problem" }

  # ── Account / profile ───────────────────────────────────────────────────
  /me:
    get:
      tags: [account]
      summary: Get the current user's profile
      responses:
        "200":
          description: Profile.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        default: { $ref: "#/components/responses/Problem" }
    patch:
      tags: [account]
      summary: Update profile (name, units)
      description: '"Changes apply everywhere, right away" — units affect display only; stored values stay metric.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                units:
                  $ref: "#/components/schemas/Units"
      responses:
        "200":
          description: Updated profile.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        default: { $ref: "#/components/responses/Problem" }

  /me/vacations:
    # Vacation ranges (BE-025, D1). Stored as one encrypted opaque blob (per-user
    # DEK); the server never reads or interprets these dates — this is durability
    # for the device-local vacation config, which drives all vacation behaviour.
    get:
      tags: [account]
      summary: Get the stored vacation ranges
      description: The ranges as last written; an empty array if the user has never set any.
      responses:
        "200":
          description: Vacation ranges.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/VacationRange" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        default: { $ref: "#/components/responses/Problem" }
    put:
      tags: [account]
      summary: Replace the stored vacation ranges
      description: >-
        Replace-on-write: the whole array is re-encrypted and replaces the
        previous value. No merge, no server-side interpretation. Echoes what was
        stored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: "#/components/schemas/VacationRange" }
      responses:
        "200":
          description: The stored vacation ranges.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/VacationRange" }
        "400": { $ref: "#/components/responses/Problem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        default: { $ref: "#/components/responses/Problem" }

  /account:
    delete:
      tags: [account]
      summary: Request account deletion (7-day grace)
      description: |
        Starts the 7-day grace period (ADR-0004): account marked pending
        deletion, all refresh tokens revoked. Any successful sign-in during the
        window cancels the deletion. After 7 days: crypto-shred + hard delete.
        Idempotent — repeating the request does not move the date.
      responses:
        "202":
          description: Deletion scheduled.
          content:
            application/json:
              schema:
                type: object
                required: [deletionEffectiveAt]
                properties:
                  deletionEffectiveAt:
                    type: string
                    format: date-time
        "401": { $ref: "#/components/responses/Unauthorized" }
        default: { $ref: "#/components/responses/Problem" }

  # ── Log entries ─────────────────────────────────────────────────────────
  /entries:
    post:
      tags: [entries]
      summary: Create a log entry (user-confirmed)
      description: |
        The single write path to the log — AI drafts reach it only after the
        user confirms. Requires an Idempotency-Key: retrying the same key
        returns the original entry (200) instead of duplicating; the same key
        with a different body returns 409.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NewEntry" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LogEntry" }
        "200":
          description: Idempotent replay — the entry previously created with this key.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LogEntry" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409":
          description: Idempotency-Key was already used with a different request body.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        default: { $ref: "#/components/responses/Problem" }
    get:
      tags: [entries]
      summary: List entries (timeline)
      description: |
        Flat list ordered by occurredAt descending, cursor-paginated. Pass
        `date` for a single day (the Today screen); omit it and follow
        `nextCursor` for infinite scroll into the past. The app groups by day
        client-side (app review pt 2). No `?updatedSince=` delta sync in v0 —
        the app refreshes by day and infers deletes from omissions (app
        review pt 3; revisit with tombstones only if multi-device happens).

        0.4.0 (BE-017) adds two additive filters, both composable with `cursor`
        and `limit`:
          - `from`/`to` — an explicit half-open `[from, to)` occurredAt window
            (either bound optional) for trends/history bulk reads. Mutually
            exclusive with `date` (sending both is a 400).
          - `type` — a CSV allow-list of entry types. Home sends
            `type=meal,water,workout` (excludes check-ins); Habits sends
            `type=checkin`. `checkin` is accepted now and returns nothing until
            that entry type ships (BE-024).
      parameters:
        - name: date
          in: query
          description: Local calendar day to fetch, interpreted with `tz`. Not combinable with from/to.
          schema:
            type: string
            format: date
        - name: tz
          in: query
          description: >-
            IANA timezone used to resolve `date` to a time range
            (e.g. Europe/Lisbon). Required when `date` is present.
          schema:
            type: string
        - name: from
          in: query
          description: Inclusive lower bound (occurredAt >=). Not combinable with `date`.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: Exclusive upper bound (occurredAt <). Not combinable with `date`.
          schema:
            type: string
            format: date-time
        - name: type
          in: query
          description: >-
            CSV allow-list of entry types to include. `checkin` is accepted
            forward-compatibly (BE-024) and matches nothing until then.
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              enum: [meal, water, workout, checkin]
        - name: cursor
          in: query
          description: Opaque cursor from a previous response.
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Page of entries.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/LogEntry" }
                  nextCursor:
                    type: string
                    description: Absent when there are no older entries.
        "401": { $ref: "#/components/responses/Unauthorized" }
        default: { $ref: "#/components/responses/Problem" }

  /entries/{entryId}:
    parameters:
      - name: entryId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [entries]
      summary: Get one entry (meal/workout detail screens)
      responses:
        "200":
          description: The entry.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LogEntry" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        default: { $ref: "#/components/responses/Problem" }
    patch:
      tags: [entries]
      summary: Update an entry
      description: |
        Partial update. `type` is immutable; sending a `detail` replaces the
        whole detail object (no per-field merge inside it) and it must match
        the entry's type.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                occurredAt:
                  type: string
                  format: date-time
                detail:
                  $ref: "#/components/schemas/EntryDetail"
      responses:
        "200":
          description: Updated entry.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LogEntry" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        default: { $ref: "#/components/responses/Problem" }
    delete:
      tags: [entries]
      summary: Delete an entry
      description: Hard delete — the log belongs to the user.
      responses:
        "204":
          description: Deleted (idempotent — deleting a missing entry also returns 204).
        "401": { $ref: "#/components/responses/Unauthorized" }
        default: { $ref: "#/components/responses/Problem" }

  # ── AI parse (drafts only — never persisted server-side) ────────────────
  /parse/text:
    post:
      tags: [parse]
      summary: Parse natural language into draft entries
      description: |
        Stateless: text in, draft entries out — nothing is stored (ADR-0005).
        The app shows the confirmation card and, on Confirm, POSTs the
        (possibly adjusted) draft to /entries. All numeric values are
        estimates. Rate-limited per user per day (abuse guard). On timeout the
        app falls back to manual entry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  minLength: 1
                  maxLength: 2000
                  description: The transcript or typed phrase, verbatim.
                capturedAt:
                  type: string
                  format: date-time
                  description: >-
                    Device time (with offset) when the phrase was captured —
                    anchors relative phrases like "around 4".
      responses:
        "200":
          description: Draft entries — usually one.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ParseResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422":
          description: The text could not be interpreted as a meal, water, or workout.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        default: { $ref: "#/components/responses/Problem" }

  /parse/photo:
    post:
      tags: [parse]
      summary: Parse a photo (plate or gym whiteboard) into draft entries
      description: |
        Stateless like /parse/text — the image is sent to the model and
        discarded, never stored. A plate photo yields a meal draft; a
        whiteboard photo yields a workout draft.

        Multipart confirmed by app review (pt 4). The app downscales
        client-side to longest edge 1568 px, JPEG quality 0.8, before upload;
        the 5 MB limit is a server-side backstop only.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: JPEG/PNG/WebP, max 5 MB.
                caption:
                  type: string
                  maxLength: 500
                  description: Optional user hint spoken/typed with the photo.
                capturedAt:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Draft entries.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ParseResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "413":
          description: Image too large.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: Nothing recognizable (no food, no workout) in the image.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        default: { $ref: "#/components/responses/Problem" }

  /parse/eating-plan:
    post:
      tags: [parse]
      summary: Parse an eating plan (text or PDF) into a draft for confirmation
      description: |
        Onboarding step 3 ("eating plan"). Stateless like /parse/text: the
        model reads the described plan or the uploaded nutritionist PDF and
        returns a structured draft plus a human-readable summary the user
        confirms before anything is saved (ADR-0005 — nothing is persisted
        server-side on this call; the uploaded PDF is read and discarded). All
        nutrition values are estimates. Single synchronous Claude call (native
        PDF input, no OCR of our own) — supersedes the async import-job sketch;
        on timeout/failure the app falls back to manual entry. On Confirm the
        app POSTs the draft to the plan-create endpoint (a later ticket).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlanImportRequest" }
      responses:
        "200":
          description: Draft eating plan.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EatingPlanDraft" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422":
          description: >-
            The input could not be interpreted as an eating plan, or the
            `fileRef` is unknown/expired.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        default: { $ref: "#/components/responses/Problem" }

  /parse/training-program:
    post:
      tags: [parse]
      summary: Parse a training program (text or PDF) into a draft for confirmation
      description: |
        Onboarding step 4 ("training program"). Stateless like
        /parse/eating-plan — structured draft plus human-readable summary,
        confirmed before anything is saved (ADR-0005). Durations and loads are
        estimates or as-stated. On Confirm the app POSTs the draft to the
        program-create endpoint (a later ticket).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlanImportRequest" }
      responses:
        "200":
          description: Draft training program.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TrainingProgramDraft" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422":
          description: >-
            The input could not be interpreted as a training program, or the
            `fileRef` is unknown/expired.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        default: { $ref: "#/components/responses/Problem" }

  # ── Uploads (presigned; bytes never pass through the API) ────────────────
  /uploads:
    post:
      tags: [uploads]
      summary: Request a presigned URL to upload a document
      description: |
        Two-phase upload for payloads that must not pass through the JSON body:
        API Gateway caps requests at 10 MB (OPS-011), and the parse pattern
        does not proxy file bytes. The app requests a short-lived presigned PUT
        URL, uploads the file straight to S3, then references the returned
        opaque `fileRef` on a parse call (e.g. /parse/eating-plan). The backend
        reads the object server-side for that one call and never persists it
        beyond the parse (ADR-0005); the bucket expires objects automatically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [purpose, contentType]
              properties:
                purpose:
                  type: string
                  enum: [plan_document]
                  description: What the upload feeds. v0 only supports plan/program import.
                contentType:
                  type: string
                  enum: [application/pdf]
                  description: MIME type of the file; the PUT must send the same Content-Type.
      responses:
        "200":
          description: Presigned upload target.
          content:
            application/json:
              schema:
                type: object
                required: [fileRef, uploadUrl, expiresAt]
                properties:
                  fileRef:
                    type: string
                    description: Opaque handle to pass to a parse endpoint after the PUT succeeds.
                  uploadUrl:
                    type: string
                    format: uri
                    description: Presigned S3 PUT URL (single use). Upload the bytes with the same Content-Type.
                  expiresAt:
                    type: string
                    format: date-time
                    description: After this the URL and fileRef are void.
        "401": { $ref: "#/components/responses/Unauthorized" }
        default: { $ref: "#/components/responses/Problem" }

  # ── Persisted eating plan & training program (versioned, editable) ───────
  # The confirmed parse draft is stored as-is, encrypted (per-user DEK, ADR-0003).
  # POST = import a new version (history capped, oldest dropped); GET = current;
  # PUT = edit current (full-doc replace + re-encrypt — no server-side merge);
  # GET …/history = the past versions (frozen; no restore in v0). BE-019/BE-020.
  /plan:
    get:
      tags: [plans]
      summary: Get the current eating plan
      description: The newest stored version, for the Home plan row and the Eating Plan screen.
      responses:
        "200":
          description: The current eating plan.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EatingPlanDraft" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        default: { $ref: "#/components/responses/Problem" }
    post:
      tags: [plans]
      summary: Import (store) an eating plan as a new version
      description: |
        Persists a confirmed plan draft as a new version. History is capped at a
        server limit (default 5); importing beyond it drops the oldest version.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EatingPlanDraft" }
      responses:
        "201":
          description: Stored eating plan (the new current version).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EatingPlanDraft" }
        "400": { $ref: "#/components/responses/Problem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        default: { $ref: "#/components/responses/Problem" }
    put:
      tags: [plans]
      summary: Edit the current eating plan
      description: |
        Full-doc replace of the current version — any field is editable. The
        whole document is re-encrypted server-side; there is no per-field merge.
        Does not create a new version (past versions are frozen).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EatingPlanDraft" }
      responses:
        "200":
          description: The edited eating plan.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EatingPlanDraft" }
        "400": { $ref: "#/components/responses/Problem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        default: { $ref: "#/components/responses/Problem" }

  /plan/history:
    get:
      tags: [plans]
      summary: List stored eating-plan versions
      description: The past versions (newest first), capped at the server limit. Frozen — display only.
      responses:
        "200":
          description: Stored eating-plan versions.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PlanVersion" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        default: { $ref: "#/components/responses/Problem" }

  /program:
    get:
      tags: [plans]
      summary: Get the current training program
      description: The newest stored version, for the Home program row and the program screen.
      responses:
        "200":
          description: The current training program.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TrainingProgramDraft" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        default: { $ref: "#/components/responses/Problem" }
    post:
      tags: [plans]
      summary: Import (store) a training program as a new version
      description: |
        Persists a confirmed program draft as a new version. History is capped at
        a server limit (default 5); importing beyond it drops the oldest version.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TrainingProgramDraft" }
      responses:
        "201":
          description: Stored training program (the new current version).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TrainingProgramDraft" }
        "400": { $ref: "#/components/responses/Problem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        default: { $ref: "#/components/responses/Problem" }
    put:
      tags: [plans]
      summary: Edit the current training program
      description: |
        Full-doc replace of the current version — any field is editable. The
        whole document is re-encrypted server-side; there is no per-field merge.
        Does not create a new version (past versions are frozen).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TrainingProgramDraft" }
      responses:
        "200":
          description: The edited training program.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TrainingProgramDraft" }
        "400": { $ref: "#/components/responses/Problem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        default: { $ref: "#/components/responses/Problem" }

  /program/history:
    get:
      tags: [plans]
      summary: List stored training-program versions
      description: The past versions (newest first), capped at the server limit. Frozen — display only.
      responses:
        "200":
          description: Stored training-program versions.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ProgramVersion" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        default: { $ref: "#/components/responses/Problem" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >-
        Client-generated key, unique per logical create, reused on retries.
        Usually a UUID; for naturally-idempotent domains it is deterministic —
        check-ins use `habitId:date` so a habit can be checked in once per day
        (BE-024).
      schema:
        type: string

  responses:
    Problem:
      description: Error (RFC 7807).
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Unauthorized:
      description: Missing, expired, or invalid access token.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    NotFound:
      description: Resource does not exist or belongs to another user.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    TooManyRequests:
      description: Rate limit exceeded. Retry after the indicated delay.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }

  schemas:
    Problem:
      type: object
      description: RFC 7807 problem details. `detail` is developer-facing English; the app owns user-facing copy (ADR-0006).
      required: [title, status]
      properties:
        type:
          type: string
          format: uri
          default: about:blank
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

    TokenPair:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:
          type: string
          description: JWT, ~15 min lifetime.
        refreshToken:
          type: string
          description: Opaque, single-use (rotated on refresh), 60-day lifetime.
        expiresIn:
          type: integer
          description: Access-token lifetime in seconds.

    Units:
      type: string
      enum: [metric, imperial]

    User:
      type: object
      required: [id, name, email, units, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        units:
          $ref: "#/components/schemas/Units"
        createdAt:
          type: string
          format: date-time
        deletionEffectiveAt:
          type: string
          format: date-time
          description: Present only while an account deletion is pending (7-day grace).

    VacationRange:
      type: object
      description: >-
        One vacation date range (BE-025). The array of these is stored server-side
        as a single encrypted opaque blob (per-user DEK); the server never reads
        or interprets it — the device drives all vacation behaviour (D1).
      required: [start, end]
      properties:
        start:
          type: string
          format: date
        end:
          type: string
          format: date

    InputMethod:
      type: string
      enum: [voice, text, photo, tap, checkin, import]
      description: checkin and import appear from W5/W6 onward; the app only sends the first four in v0.

    EntrySource:
      type: string
      enum: [user, apple_health, health_connect]
      description: Server-set. /entries creates are always `user`; health ingestion (W6, separate contract) writes the others.

    NewEntry:
      type: object
      description: >-
        Create payload for /entries — also exactly the draft shape returned by
        the parse endpoints, so a confirmed draft is POSTed as-is.
      required: [type, occurredAt, inputMethod, detail]
      properties:
        type:
          type: string
          enum: [meal, water, workout, checkin]
          description: >-
            `checkin` (BE-024) rides this same write path as a habit check-in
            result; Home reads exclude it, Habits reads select it (see GET
            /entries `type`).
        occurredAt:
          type: string
          format: date-time
          description: When it happened (user-adjustable), with offset.
        inputMethod:
          $ref: "#/components/schemas/InputMethod"
        sourcePhrase:
          type: string
          maxLength: 2000
          description: The user's original words, quoted on the detail screen ("logged by voice").
        isEstimate:
          type: boolean
          default: false
          description: True for AI-derived numbers — drives the "Estimated by Vita" label.
        detail:
          $ref: "#/components/schemas/EntryDetail"

    LogEntry:
      allOf:
        - $ref: "#/components/schemas/NewEntry"
        - type: object
          required: [id, source, loggedAt, updatedAt]
          properties:
            id:
              type: string
              format: uuid
            source:
              $ref: "#/components/schemas/EntrySource"
            loggedAt:
              type: string
              format: date-time
              description: Server receive time.
            updatedAt:
              type: string
              format: date-time
              description: Bumped on every change — the app's offline-sync freshness marker.

    EntryDetail:
      description: Typed payload; discriminated by the sibling `type` field on the entry.
      oneOf:
        - $ref: "#/components/schemas/MealDetail"
        - $ref: "#/components/schemas/WaterDetail"
        - $ref: "#/components/schemas/WorkoutDetail"
        - $ref: "#/components/schemas/CheckinDetail"

    MealDetail:
      type: object
      required: [items]
      properties:
        title:
          type: string
          maxLength: 100
          description: Short display title, e.g. "Banana & peanuts".
        items:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/MealItem" }
        totals:
          $ref: "#/components/schemas/MacroTotals"

    MealItem:
      type: object
      required: [name, kcal]
      properties:
        name:
          type: string
          maxLength: 100
        quantity:
          type: number
        unit:
          type: string
          maxLength: 20
          description: Free-form ("g", "ml", "handful", "slice"). Display verbatim.
        kcal:
          type: number
          minimum: 0
        proteinG:
          type: number
          minimum: 0
        carbsG:
          type: number
          minimum: 0
        fatG:
          type: number
          minimum: 0
        micros:
          type: array
          items: { $ref: "#/components/schemas/Micro" }

    Micro:
      type: object
      required: [name, amount, unit]
      properties:
        name:
          type: string
          maxLength: 50
          description: >-
            Free-form name (e.g. "Vitamin C", "Iron") — the app renders it
            verbatim (app review pt 7).
        amount:
          type: number
          minimum: 0
        unit:
          type: string
          maxLength: 10
          description: mg, µg, g…
        percentDaily:
          type: number
          minimum: 0
          description: Percent of the FDA Daily Value (ADR-0009). Estimate.

    MacroTotals:
      type: object
      description: Denormalized totals for cards/aggregation. Server recomputes from items on write; clients treat as read-mostly.
      required: [kcal]
      properties:
        kcal:
          type: number
          minimum: 0
        proteinG:
          type: number
          minimum: 0
        carbsG:
          type: number
          minimum: 0
        fatG:
          type: number
          minimum: 0

    WaterDetail:
      type: object
      required: [amountMl]
      properties:
        amountMl:
          type: integer
          minimum: 1
          maximum: 10000
          description: Always milliliters on the wire; the app converts for imperial display.

    WorkoutDetail:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 100
        durationMin:
          type: integer
          minimum: 1
        kcal:
          type: number
          minimum: 0
          description: Energy estimate.
        muscles:
          type: array
          items:
            type: string
            enum:
              - chest
              - back
              - shoulders
              - biceps
              - triceps
              - forearms
              - core
              - glutes
              - quads
              - hamstrings
              - calves
          description: >-
            Closed vocabulary — exactly the 11 silhouettes the body-map UI
            supports (app review pt 6). Backend maps model output onto this
            list and drops anything unmappable ("lats"/"traps" → back,
            "abs"/"obliques" → core).
        exercises:
          type: array
          items: { $ref: "#/components/schemas/Exercise" }

    Exercise:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
        sets:
          type: integer
          minimum: 1
        reps:
          type: integer
          minimum: 1
        loadKg:
          type: number
          minimum: 0
          description: Always kg on the wire; the app converts for imperial display.
        muscles:
          type: array
          items:
            type: string
            enum:
              - chest
              - back
              - shoulders
              - biceps
              - triceps
              - forearms
              - core
              - glutes
              - quads
              - hamstrings
              - calves
          description: >-
            Same closed vocabulary as WorkoutDetail.muscles, but per exercise —
            drives per-exercise muscle tinting in the app (0.5.0). Optional; the
            backend maps model output onto this list and drops anything
            unmappable. The workout-level `muscles` stays for back-compat.

    CheckinDetail:
      type: object
      description: >-
        A single habit check-in result (BE-024). Rides the /entries write path
        as a `checkin` entry and is encrypted at rest like every other detail;
        the server stores it verbatim and never interprets it. The
        Idempotency-Key is deterministic — `habitId:date` — so there is one
        check-in per habit per day; change the answer by PATCHing the entry
        (same key + a different answer is a 409). No scores, no streaks.
      required: [habitId, habitName, kind, answer]
      properties:
        habitId:
          type: string
          maxLength: 100
          description: Device-local habit id — habit definitions live on the device (D1).
        habitName:
          type: string
          maxLength: 100
        kind:
          type: string
          maxLength: 40
          description: App-defined habit kind (e.g. plan-meal vs plain yes/no). Server-opaque.
        answer:
          type: string
          maxLength: 40
          description: The user's single answer, e.g. "yes" / "not_quite". App-defined.
        note:
          type: string
          maxLength: 500

    ParseResult:
      type: object
      description: Never persisted server-side — response only (ADR-0005).
      required: [drafts]
      properties:
        drafts:
          type: array
          minItems: 1
          maxItems: 5
          items: { $ref: "#/components/schemas/NewEntry" }
          description: >-
            Usually one. A phrase like "had a sandwich and a big glass of
            water" yields two (meal + water). Capped at 5 so the app's
            stacked confirmation cards stay bounded (app review pt 5); the
            model merges or drops beyond that.

    PlanImportRequest:
      type: object
      description: >-
        Provide the plan either as free text (described/pasted) or as a
        reference to a PDF uploaded via POST /uploads. Exactly one of `text`
        or `fileRef`.
      oneOf:
        - required: [text]
        - required: [fileRef]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 8000
          description: The plan or program described or pasted as text.
        fileRef:
          type: string
          description: >-
            `fileRef` from POST /uploads, pointing at an uploaded
            nutritionist/coach PDF.

    EatingPlanDraft:
      type: object
      description: >-
        Never persisted server-side — response only (ADR-0005). Shaped so the
        confirmed draft is POSTed as-is to the plan-create endpoint (later
        ticket). All nutrition is estimate.
      required: [summary, meals]
      properties:
        summary:
          type: string
          maxLength: 1000
          description: >-
            Human-readable read-back shown for confirmation ("AI reads back a
            plan summary").
        dailyTotals:
          $ref: "#/components/schemas/MacroTotals"
        micros:
          type: array
          items: { $ref: "#/components/schemas/Micro" }
          description: Daily micronutrient chips (estimates) for the Eating Plan screen.
        meals:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/PlanMeal" }

    PlanMeal:
      type: object
      required: [name, items]
      properties:
        name:
          type: string
          maxLength: 100
          description: Meal slot label, e.g. "Breakfast", "Lunch", "Snack", "Dinner".
        time:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          description: Local time-of-day (HH:MM) the plan suggests, when it states one.
        items:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/PlanItem" }

    PlanItem:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
        quantity:
          type: number
        unit:
          type: string
          maxLength: 20
          description: Free-form ("g", "ml", "slice"). Display verbatim.
        nutritionPerUnit:
          $ref: "#/components/schemas/MacroTotals"

    TrainingProgramDraft:
      type: object
      description: Never persisted server-side — response only (ADR-0005).
      required: [summary, days]
      properties:
        summary:
          type: string
          maxLength: 1000
          description: Human-readable read-back shown for confirmation.
        splitDescription:
          type: string
          maxLength: 500
          description: The overall split in a phrase, e.g. "Push / Pull / Legs, 5 days".
        days:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/ProgramDay" }

    ProgramDay:
      type: object
      required: [name, exercises]
      properties:
        name:
          type: string
          maxLength: 100
          description: Day label, e.g. "Day 1 - Push", "Upper A".
        exercises:
          type: array
          items: { $ref: "#/components/schemas/Exercise" }

    PlanVersion:
      type: object
      description: One stored eating-plan version (history). Frozen — display only.
      required: [id, createdAt, doc]
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        doc: { $ref: "#/components/schemas/EatingPlanDraft" }

    ProgramVersion:
      type: object
      description: One stored training-program version (history). Frozen — display only.
      required: [id, createdAt, doc]
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        doc: { $ref: "#/components/schemas/TrainingProgramDraft" }
